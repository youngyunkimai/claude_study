<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemma3 챗봇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 16px 20px;
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #knowledge-count {
      font-size: 0.8rem;
      opacity: 0.85;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.bot {
      background: #f1f5f9;
      color: #1e293b;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: #2563eb;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.system {
      background: #fef9c3;
      color: #713f12;
      align-self: center;
      font-size: 0.85rem;
      border-radius: 8px;
      text-align: center;
    }

    .input-area {
      padding: 16px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 8px;
    }

    #input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #input:focus { border-color: #2563eb; }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.2s;
    }

    #send-btn {
      background: #2563eb;
      color: white;
    }
    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    #end-btn {
      background: #f1f5f9;
      color: #475569;
    }
    #end-btn:hover { background: #e2e8f0; }
    #end-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span>Gemma3 챗봇</span>
      <span id="knowledge-count">저장된 지식: 0개</span>
    </header>
    <div id="chat-box">
      <div class="message bot">안녕하세요! 무엇이든 물어보세요. 대화가 끝나면 [종료] 버튼을 눌러 대화 내용을 지식으로 저장할 수 있습니다.</div>
    </div>
    <div class="input-area">
      <input id="input" type="text" placeholder="메시지를 입력하세요..." autocomplete="off">
      <button id="send-btn">전송</button>
      <button id="end-btn">종료</button>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
